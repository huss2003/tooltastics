name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID || '' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: eb41653166075c836748e38e2e060161
          command: pages deploy dist/ --branch main --project-name tooltastics

      - name: Verify Deployment
        run: |
          sleep 10
          curl -sI https://tooltastics.pages.dev/en/ | head -1
          curl -sI https://tooltastics.pages.dev/en/tools/gst-calculator/ | head -1
